#:schema node_modules/wrangler/config-schema.json
name = "sublink-worker"
main = "src/worker.jsx"
compatibility_date = "2024-07-24"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "SUBLINK_KV", id = "8943789ed0af49659f887fc740d11240" }
]

[assets]
directory = "./public"

# 每分钟触发一次，检查并刷新到期的聚合器
[triggers]
crons = ["* * * * *"]
